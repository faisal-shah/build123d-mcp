name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # build123d is pre-1.0; test against both supported minors.
        build123d: ["0.10.0", "0.11.0"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      # Sets up xvfb on Linux and Mesa3D on Windows (no-op on macOS).
      # vtk 9.3.1 ships no cp313 wheel, so pin Python below to 3.12.
      - uses: pyvista/setup-headless-display-action@v4

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev --upgrade-package "build123d==${{ matrix.build123d }}"

      # Lint/type/format are OS- and version-independent — run once, on the
      # Linux + newest-build123d leg.
      - name: Type check
        if: runner.os == 'Linux' && matrix.build123d == '0.11.0'
        run: uv run mypy src/build123d_mcp/

      - name: Lint
        if: runner.os == 'Linux' && matrix.build123d == '0.11.0'
        run: uv run ruff check .

      - name: Format check
        if: runner.os == 'Linux' && matrix.build123d == '0.11.0'
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest tests/ -v --timeout=300
