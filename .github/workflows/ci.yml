name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Sets up xvfb on Linux and Mesa3D on Windows (no-op on macOS).
      # vtk 9.3.1 ships no cp313 wheel, so pin Python below to 3.12.
      - uses: pyvista/setup-headless-display-action@v3

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Type check
        if: runner.os == 'Linux'
        run: uv run mypy src/build123d_mcp/

      # Lint + format are OS-independent — run once on Linux (like mypy).
      - name: Lint
        if: runner.os == 'Linux'
        run: uv run ruff check .

      - name: Format check
        if: runner.os == 'Linux'
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest tests/ -v --timeout=300
